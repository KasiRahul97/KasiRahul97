<svg width="1000" height="230" viewBox="0 0 1000 230" xmlns="http://www.w3.org/2000/svg">
    <defs>
          <linearGradient id="pbg" x1="0" y1="0" x2="1000" y2="230" gradientUnits="userSpaceOnUse">
                  <stop offset="0" stop-color="#0d1117"/>
                  <stop offset="1" stop-color="#10141c"/>
          </linearGradient>
          <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                  <path d="M 0 0 L 10 5 L 0 10 z" fill="#22D3EE"/>
          </marker>
    </defs>

    <rect width="1000" height="230" rx="10" fill="url(#pbg)"/>

    <line x1="150" y1="115" x2="850" y2="115" stroke="#30363d" stroke-width="2"/>

    <rect x="20" y="80" width="150" height="70" rx="8" fill="#161b22" stroke="#6366F1" stroke-width="1.5"/>
    <text x="95" y="108" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#c9d1d9">Shipment data</text>
    <text x="95" y="126" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#8b949e">multi-TB, 24/7</text>

    <line x1="170" y1="115" x2="238" y2="115" stroke="#6366F1" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="240" y="80" width="160" height="70" rx="8" fill="#161b22" stroke="#6366F1" stroke-width="1.5"/>
    <text x="320" y="108" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#c9d1d9">PySpark ingest</text>
    <text x="320" y="126" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#8b949e">on Databricks</text>

    <line x1="400" y1="115" x2="468" y2="115" stroke="#6366F1" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="470" y="72" width="190" height="86" rx="8" fill="#161b22" stroke="#22D3EE" stroke-width="1.5"/>
    <text x="565" y="102" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#c9d1d9">SLA prioritization</text>
    <text x="565" y="120" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#8b949e">Hot / Cold / Past Due</text>
    <text x="565" y="138" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#8b949e">routing decisions</text>

    <line x1="660" y1="115" x2="728" y2="115" stroke="#6366F1" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="730" y="80" width="160" height="70" rx="8" fill="#161b22" stroke="#6366F1" stroke-width="1.5"/>
    <text x="810" y="108" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#c9d1d9">Analytical SQL</text>
    <text x="810" y="126" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="11" fill="#8b949e">container-level insight</text>

    <text x="500" y="200" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#6e7681">Global logistics ops read this pipeline in real time to route shipments before SLAs break.</text>
